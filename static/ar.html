<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AR Maintenance System</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }

.overlay {
  position: fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background: rgba(0,0,0,0.6);
  color:white;
  padding:10px;
  border-radius:8px;
  z-index:999;
}

.logbar {
  position: fixed;
  bottom:0;
  left:0;
  right:0;
  background: rgba(0,20,40,0.9);
  color:#00FF88;
  font-family: monospace;
  font-size:0.8rem;
  padding:10px;
  max-height:120px;
  overflow-y:auto;
  z-index:999;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="overlay">
  <a href="/">Return to Tool Tracker</a> |  <a href="/faults">Return to Faults Logs</a>
  <h3>AR Maintenance</h3>
  <p id="status">Scanning...</p>
  <div id="dataPanel"></div>
</div>

<div class="logbar" id="logbar"></div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled:false;">

  <!-- Tool marker -->
  <a-marker preset="hiro" id="toolMarker">

    <a-box id="toolBox"
      position="0 0.5 0"
      scale="0.8 0.8 0.8"
      opacity="0.9"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
    </a-box>

    <a-text id="toolText"
      value="Tool"
      position="0 1.4 0"
      align="center"
      color="#ffffff">
    </a-text>

  </a-marker>

  <!-- Fault marker -->
  <a-marker preset="kanji" id="faultMarker">

    <a-text value="FAULT DETECTED"
      position="0 1.2 0"
      align="center"
      color="#FF4444">
    </a-text>

    <a-text id="faultText"
      value="Loading..."
      position="0 0.5 0"
      align="center"
      color="#ffffff">
    </a-text>

    <a-sphere id="faultSphere"
      position="0 0.2 0"
      radius="0.3"
      material="color:red; opacity:0.4; wireframe:true">
    </a-sphere>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>
const statusEl = document.getElementById("status");
const logbar = document.getElementById("logbar");

const toolMarker = document.getElementById("toolMarker");
const faultMarker = document.getElementById("faultMarker");

const toolText = document.getElementById("toolText");
const toolBox = document.getElementById("toolBox");

const faultText = document.getElementById("faultText");
const faultSphere = document.getElementById("faultSphere");

const dataPanel = document.getElementById("dataPanel");

// Mini log bar system
function logEvent(msg, type="info"){
  const time = new Date().toLocaleTimeString();
  const entry = document.createElement("div");

  entry.textContent = `[${time}] ${msg}`;
  entry.style.color = type === "warn" ? "#FF8800" : "#00FF88";

  logbar.appendChild(entry);
  logbar.scrollTop = logbar.scrollHeight;
}

// Load tool
async function loadTool(){
  const res = await fetch("/api/tools");
  const tools = await res.json();

  if(!tools.length) return;

  const tool = tools[0];

  toolText.setAttribute("value", `${tool.name}\n(${tool.status})`);

  let colour = "#00cc66";
  if(tool.status === "in-use") colour = "#f0c040";
  if(tool.status === "missing") colour = "#cc3333";

  toolBox.setAttribute("color", colour);
}

// Update tool
async function updateTool(status){
  const res = await fetch("/api/tools");
  const tools = await res.json();

  if(!tools.length) return;

  const tool = tools[0];

  await fetch(`/api/tools/${tool.id}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status })
  });

  loadTool();
}

// Load fault
async function loadFault(){
  try {
    const res = await fetch("/api/faults/detect");
    const data = await res.json();

    if (!data.detected) {
      faultText.setAttribute("value", "No faults detected");
      faultSphere.setAttribute("material", "color:green; opacity:0.3;");
      logEvent("No faults detected");
      return;
    }

    const fault = data.fault;

    faultText.setAttribute(
      "value",
      `${fault.type}\nSeverity: ${fault.severity}`
    );

    let colour = "red";
    if (fault.severity === "medium") colour = "orange";
    if (fault.severity === "low") colour = "yellow";

    faultSphere.setAttribute(
      "material",
      `color:${colour}; opacity:0.4; wireframe:true`
    );

    logEvent(`Fault detected: ${fault.type}`, "warn");

  } catch (err) {
    console.error(err);
    faultText.setAttribute("value", "Detection error");
  }
}

// Events
// Tool
toolMarker.addEventListener("markerFound", ()=>{
  statusEl.textContent = "Tool detected";
  logEvent("Tool marker detected");

  dataPanel.innerHTML = `
    <button onclick="updateTool('in-use')">Use</button>
    <button onclick="updateTool('available')">Return</button>
    <button onclick="updateTool('missing')">Missing</button>
  `;
});

toolMarker.addEventListener("markerLost", ()=>{
  dataPanel.innerHTML = "";
  statusEl.textContent = "Tool marker lost";
});

// Fault
faultMarker.addEventListener("markerFound", ()=>{
  statusEl.textContent = "Fault detected";
  logEvent("Fault marker detected", "warn");

  dataPanel.innerHTML = ""; // clear tool buttons
  loadFault(); // reload data
    
});

faultMarker.addEventListener("markerLost", ()=>{
  statusEl.textContent = "Fault marker lost";
  faultText.setAttribute("value", "No fault");
});

// INIT
loadTool();
logEvent("System ready");
</script>
