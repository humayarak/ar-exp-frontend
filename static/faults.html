<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fault Tracker</title>

  <style>
    body { font-family: system-ui, Arial; margin: 16px; max-width: 800px; }
    .card { padding: 12px; border: 1px solid #ddd; border-radius: 12px; margin: 10px 0; }
    input, select, button { font-size: 16px; padding: 10px; width: 100%; margin: 6px 0; }
    button { cursor: pointer; }
    .row { display: grid; gap: 10px; grid-template-columns: 1fr; }
    @media (min-width: 540px) { .row { grid-template-columns: 1fr 1fr; } }
    .muted { color: #666; font-size: 14px; }
    .badge { padding: 4px 8px; border-radius: 8px; font-size: 12px; }

    .low { background: #d4edda; }
    .medium { background: #fff3cd; }
    .high { background: #f8d7da; }

    .open { border-left: 5px solid #cc3333; }
    .resolved { border-left: 5px solid #00cc66; }
  </style>
</head>

<body>

<h1>Fault Tracker</h1>
<p class="muted">
  <a href="/">Tools Tracker</a> | 
  <a href="/ar">Open AR View</a>
</p>

<!-- Add fault -->
<div class="card">
  <h2>Add Fault</h2>

  <div class="row">
    <input id="type" placeholder="Fault type (e.g. Door failure)" />
    <select id="severity">
      <option value="">Select severity</option>
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>
    <input id="location" placeholder="Location (e.g. Tram carriage A)" />
  </div>

  <button id="addFaultBtn">Add Fault</button>
  <pre id="msg"></pre>
</div>

<!-- Filters -->
<div class="card">
  <h2>Faults</h2>

  <div class="row">
    <button id="filterAll">All</button>
    <button id="filterOpen">Open</button>
    <button id="filterResolved">Resolved</button>
  </div>

  <div id="list"></div>
</div>

<script>
const listEl = document.getElementById("list");
const msgEl = document.getElementById("msg");

const typeEl = document.getElementById("type");
const severityEl = document.getElementById("severity");
const locationEl = document.getElementById("location");

let currentFilter = null;

// Load faults
async function loadFaults() {
  try {
    const res = await fetch("/api/faults");
    let faults = await res.json();

    if (currentFilter) {
      faults = faults.filter(f => f.status === currentFilter);
    }

    renderFaults(faults);

  } catch (err) {
    msgEl.textContent = "Failed to load faults";
  }
}

function renderFaults(faults) {
  if (!faults.length) {
    listEl.innerHTML = "<p class='muted'>No faults found</p>";
    return;
  }

  listEl.innerHTML = faults.map(f => `
    <div class="card ${f.status}">
      <strong>${f.type}</strong><br>
      Location: ${f.location || "N/A"}<br>
      Severity: <span class="badge ${f.severity}">${f.severity}</span><br>
      Status: ${f.status}

      ${f.status === "open" ? `
        <button onclick="resolveFault(${f.id})">Mark Resolved</button>
      ` : ""}
    </div>
  `).join("");
}

// Add fault
document.getElementById("addFaultBtn").addEventListener("click", async () => {
  const type = typeEl.value.trim();
  const severity = severityEl.value;
  const location = locationEl.value.trim();

  if (!type || !severity) {
    msgEl.textContent = "Type and severity required";
    return;
  }

  try {
    await fetch("/api/faults", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        type,
        severity,
        location,
        status: "open"
      })
    });

    msgEl.textContent = "Fault added ✔";

    typeEl.value = "";
    severityEl.value = "";
    locationEl.value = "";

    loadFaults();

  } catch (err) {
    msgEl.textContent = "Error adding fault";
  }
});

// Fault status = fixed
async function resolveFault(id) {
  await fetch(`/api/faults/${id}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status: "resolved" })
  });

  loadFaults();
}

// Filters
document.getElementById("filterAll").onclick = () => {
  currentFilter = null;
  loadFaults();
};

document.getElementById("filterOpen").onclick = () => {
  currentFilter = "open";
  loadFaults();
};

document.getElementById("filterResolved").onclick = () => {
  currentFilter = "resolved";
  loadFaults();
};

// Init
loadFaults();
</script>

</body>
</html>
