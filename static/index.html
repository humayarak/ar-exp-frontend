<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tool Tracker</title>

  <style>
    body { font-family: system-ui, Arial; margin: 16px; max-width: 720px; }
    .card { padding: 12px; border: 1px solid #ddd; border-radius: 12px; margin: 10px 0; }
    input, button { font-size: 16px; padding: 10px; width: 100%; margin: 6px 0; }
    button { cursor: pointer; }
    .row { display: grid; gap: 10px; grid-template-columns: 1fr; }
    @media (min-width: 540px) { .row { grid-template-columns: 1fr 1fr; } }
    .muted { color: #666; font-size: 14px; }
  </style>
</head>

<body>

<h1>Tool Tracker</h1>
<p class="muted">
  <a href="/ar">Open AR View</a>
  <a href="/faults">Fault Logs</a>
</p>

<div class="card">
  <h2>Add Tool</h2>

  <div class="row">
    <input id="name" placeholder="Tool name (e.g., 'Wrench')" />
    <input id="type" placeholder="Tool type (e.g., 'Mechanical')" />
    <input id="location" placeholder="Location (optional)" />
  </div>

  <button id="addBtn" type="button">Add Tool</button>
  <pre id="msg"></pre>
</div>

<div class="card">
  <h2>Tools</h2>

  <!-- Filters -->
  <div class="row">
    <button id="filterAll" type="button">All</button>
    <button id="filterAvailable" type="button">Available</button>
    <button id="filterInUse" type="button">In use</button>
    <button id="filterMissing" type="button">Missing</button>
  </div>

  <div id="list"></div>
</div>

<div class="card">
  <h2>Details</h2>
  <div id="details" class="muted">Click a tool to view details.</div>
</div>

<script type="module" src="/js/app.js"></script>

</body>
</html>
